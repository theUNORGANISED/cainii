<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Cainii — the CRM built for NGOs. Join the waitlist and be first to know when we launch." />
  <title>Cainii — Newsletter</title>

  <link rel="icon" href="assets/favicon.svg" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- CSS -->
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/nav.css" />
  <link rel="stylesheet" href="css/hero.css" />
</head>
<body>

  <!-- ── Navigation ── -->
  <header class="nav">
    <a href="/" class="nav__logo" aria-label="Cainii home">
      <!--
        Replace the span below with:
        <img src="assets/logo.svg" alt="cainii" />
        once you have the SVG logo file.
      -->
      <img src="logo.svg" alt="cainii" />
    </a>
  </header>

  <!-- ── Hero ── -->
  <main>
    <section class="hero">
      <div class="hero__inner">

        <h1 class="hero__title">NEWSLETTER</h1>

        <p class="hero__sub">
          We surface the right donor data at the right moment,
          so you can focus on what actually matters.
          Sign up to follow the build.
        </p>

        <!-- Mailchimp form -->
        <form
          class="signup-form-wrap"
          action="https://gmail.us17.list-manage.com/subscribe/post?u=12050a1c43444a8fcd8c79bce&amp;id=4baed7a808&amp;v_id=1&amp;f_id=00232be1f0"
          method="POST"
          target="_blank"
        >
          <div class="signup-form">
            <input
              type="email"
              name="EMAIL"
              placeholder="Your email address"
              required
            />
            <!-- Mailchimp honeypot -->
            <div style="position:absolute;left:-5000px" aria-hidden="true">
              <input
                type="text"
                name="b_12050a1c43444a8fcd8c79bce_4baed7a808"
                tabindex="-1"
                value=""
              />
            </div>
            <button type="submit"><span>→</span></button>
          </div>

          <div class="gdpr-check">
            <label>
              <input type="checkbox" name="gdpr[83011]" value="Y" required />
              <span>
                I agree to receive founder updates and accept the
                <a href="/privacy" target="_blank">Privacy Policy</a>.
                Unsubscribe anytime.
              </span>
            </label>
          </div>
        </form>

      </div>
    </section>
  </main>

  <script src="js/main.js" defer></script>

</body>
</html>
